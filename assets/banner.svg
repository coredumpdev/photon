<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" role="img" aria-label="Photon — WebGL2 scientific plotting">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#111a33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="85" x2="1280" y2="85"/>
    <line x1="0" y1="170" x2="1280" y2="170"/>
    <line x1="0" y1="255" x2="1280" y2="255"/>
  </g>

  <!-- chart motif: bars -->
  <g opacity="0.85">
    <rect x="712" y="196" width="26" height="104" rx="3" fill="#60a5fa" opacity="0.5"/>
    <rect x="748" y="150" width="26" height="150" rx="3" fill="#818cf8" opacity="0.5"/>
    <rect x="784" y="210" width="26" height="90" rx="3" fill="#a78bfa" opacity="0.5"/>
    <rect x="820" y="130" width="26" height="170" rx="3" fill="#c084fc" opacity="0.5"/>
    <rect x="856" y="176" width="26" height="124" rx="3" fill="#f472b6" opacity="0.5"/>
  </g>

  <!-- chart motif: glowing waveform -->
  <path filter="url(#glow)" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"
        d="M690 210
           C 730 120, 770 300, 810 200
           S 890 90, 930 190
           S 1010 280, 1050 170
           S 1130 110, 1180 200"/>

  <!-- scatter points -->
  <g fill="#f472b6">
    <circle cx="730" cy="132" r="5"/><circle cx="880" cy="112" r="5"/>
    <circle cx="1010" cy="255" r="5"/><circle cx="1150" cy="150" r="5"/>
    <circle cx="960" cy="200" r="4" fill="#60a5fa"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="160" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="88" font-weight="800" fill="#f8fafc">Photon</text>
  <rect x="84" y="184" width="150" height="6" rx="3" fill="url(#accent)"/>
  <text x="84" y="228" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">WebGL2 scientific plotting for the web</text>
  <text x="84" y="266" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#64748b">line · scatter · bar · area · histogram · box · heatmap · contour · hexbin · polar · 3D</text>
</svg>
