name: Pages

# Deploy the live demo (vanilla gallery + playground) and the LLM docs to
# GitHub Pages at https://coredumpdev.github.io/photon/ .
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build # packages first — examples need core's dist types
      - name: Build demo site
        run: |
          npx vite build examples/vanilla --base /photon/
          npx vite build examples/playground --base /photon/playground/
          mkdir -p site/playground
          cp -r examples/vanilla/dist/. site/
          cp -r examples/playground/dist/. site/playground/
          cp llms.txt llms-full.txt AGENTS.md site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
