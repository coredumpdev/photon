<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Photon — ML / deep-learning charts</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #0b1020; color: #cbd5e1; }
      header { padding: 18px 22px 6px; }
      header h1 { margin: 0; font-size: 18px; }
      header h1 b { color: #60a5fa; }
      header p { margin: 5px 0 0; font-size: 13px; color: #94a3b8; max-width: 70ch; }
      header code { color: #a5b4fc; font-size: 12px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 14px; padding: 16px 22px 48px; }
      .panel { border: 1px solid #1e293b; border-radius: 10px; background: #0e1526; overflow: hidden; }
      .panel h2 { margin: 0; padding: 9px 13px; font-size: 13px; font-weight: 600; color: #e2e8f0; border-bottom: 1px solid #1e293b; }
      .panel h2 span { color: #64748b; font-weight: 400; margin-left: 6px; }
      .chart { height: 280px; }
    </style>
  </head>
  <body>
    <header>
      <h1><b>Photon</b> · ML / deep-learning charts</h1>
      <p>
        Every panel is a composed builder — <code>addConfusionMatrix</code>, <code>addRocCurve</code>,
        <code>addEmbedding</code>, <code>addShapBeeswarm</code>, <code>addTrainingCurves</code>… — over the
        same WebGL2 engine, all sharing one GL context. Synthetic, in-browser data; zero runtime deps.
      </p>
    </header>
    <div class="grid" id="grid"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
